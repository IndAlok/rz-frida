---
name: root
commands:
  - name: frida
    cname: cmd_frida
    summary: "Interact with Frida targets"
    description: >
      Commands for the rz-frida integration covering plugin and session status,
      frida:// URI validation, device, process, and application enumeration,
      and session lifecycle across local, USB, and remote targets.
    details:
      - name: "Session status"
        entries:
          - text: "fridas"
            comment: "Print plugin/session status in plain text"
          - text: "fridasj"
            comment: "Print plugin/session status as JSON"
      - name: "URI grammar"
        entries:
          - text: "fridau "
            arg_str: "frida://attach/local//1234"
            comment: "Validate URI for attaching to local PID 1234"
          - text: "fridau "
            arg_str: "frida://spawn/usb/device-1/com.example.app"
            comment: "Validate URI for spawning an Android package over USB"
          - text: "fridau "
            arg_str: "frida://attach/remote/127.0.0.1:27042/4321"
            comment: "Validate URI for attaching to PID 4321 over remote frida-server"
          - text: "fridauj "
            arg_str: "frida://launch/local///bin/ls"
            comment: "Validate launch URI for /bin/ls and emit JSON"
      - name: "Device enumeration"
        entries:
          - text: "fridadj"
            comment: "Enumerate connected Frida devices as JSON"
      - name: "Process listing"
        entries:
          - text: "fridapj"
            comment: "Enumerate local processes as JSON"
          - text: "fridapj "
            arg_str: "frida://list/usb/device-1/"
            comment: "Enumerate processes on a USB device as JSON"
      - name: "Application listing"
        entries:
          - text: "fridaaj"
            comment: "Enumerate local applications as JSON"
          - text: "fridaaj "
            arg_str: "frida://apps/usb/device-1/"
            comment: "Enumerate applications on a USB device as JSON"
      - name: "Session control"
        entries:
          - text: "fridaoj "
            arg_str: "frida://spawn/local///bin/ls"
            comment: "Spawn /bin/ls suspended and open a session"
          - text: "fridarj"
            comment: "Resume the spawned target"
          - text: "fridacj"
            comment: "Close the open session"
      - name: "Script execution"
        entries:
          - text: "fridaij"
            comment: "Ping the agent and read its version and target info"
          - text: "fridaej "
            arg_str: "Process.arch"
            comment: "Evaluate a JavaScript expression in the target process"
          - text: "fridalj "
            arg_str: "hook.js"
            comment: "Load and evaluate a JavaScript file in the target process"
          - text: "fridamj"
            comment: "Read buffered agent log, error, and send messages"
      - name: "Memory access"
        entries:
          - text: "fridaxj "
            arg_str: "0x1000 64"
            comment: "Read 64 bytes of the target memory as hex"
          - text: "fridawj "
            arg_str: "0x1000 deadbeef"
            comment: "Write four bytes into the target memory"
      - name: "Runtime info"
        entries:
          - text: "fridaRj"
            comment: "List the target memory ranges"
          - text: "fridatj"
            comment: "List the target threads"
          - text: "fridaMj"
            comment: "List the target modules"
          - text: "fridaEj "
            arg_str: "libc.so"
            comment: "List the exports of a module"
          - text: "fridaIj "
            arg_str: "libc.so"
            comment: "List the imports of a module"
          - text: "fridaSj "
            arg_str: "libc.so"
            comment: "List the symbols of a module"
    subcommands:
      - name: fridas
        cname: cmd_fridas
        summary: "Print Frida session status"
        description: >
          Reports whether a session is active and prints the current session
          state (new, resolved, connecting, attached, detaching, closed, or
          error).
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_STANDARD
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridau
        cname: cmd_fridau
        summary: "Validate a frida:// URI"
        description: >
          Parses and validates a frida:// URI without contacting any Frida
          device. Useful for verifying URI syntax in scripts or CI before
          attempting to attach.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_STANDARD
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: uri
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "URI grammar"
            entries:
              - text: "frida://"
                arg_str: "<action>/<transport>/<device>/<target>"
                comment: "Full grammar for the frida:// URI"
              - text: "action   "
                arg_str: "= list | apps | attach | spawn | launch"
                comment: "Operation requested for the session"
              - text: "transport"
                arg_str: "= local | usb | remote"
                comment: "Transport used to reach the Frida target"
              - text: "device   "
                arg_str: "= empty | device-id | host:port"
                comment: "Empty for local, id for USB, host:port for remote"
              - text: "target   "
                arg_str: "= pid | process-name | package-name | executable-path"
                comment: "Target selector required by attach/spawn/launch"
          - name: "Examples"
            entries:
              - text: "fridau "
                arg_str: "frida://attach/local//1234"
                comment: "Attach to local PID 1234"
              - text: "fridau "
                arg_str: "frida://spawn/usb/device-1/com.example.app"
                comment: "Spawn an Android package on a USB device"
              - text: "fridau "
                arg_str: "frida://launch/local///bin/ls"
                comment: "Launch /bin/ls locally (note the leading slash in the path)"
              - text: "fridauj "
                arg_str: "frida://attach/remote/127.0.0.1:27042/4321"
                comment: "Validate remote-attach URI and emit JSON"
      - name: fridad
        cname: cmd_fridad
        summary: "List Frida devices"
        description: >
          Enumerates devices known to the Frida device manager (local, USB, and
          remote) and emits a structured JSON reply.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridap
        cname: cmd_fridap
        summary: "List processes on a device"
        description: >
          Enumerates the processes visible to a Frida device and emits a
          structured JSON reply. With no argument it lists the local device, or
          pass a frida:// URI to select a USB or remote device.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: uri
            type: RZ_CMD_ARG_TYPE_STRING
            optional: true
        details:
          - name: "Examples"
            entries:
              - text: "fridapj"
                comment: "List local processes as JSON, returns a frida_unavailable error if built without frida-core"
              - text: "fridapj "
                arg_str: "frida://list/usb/device-1/"
                comment: "List processes on a USB device by id"
              - text: "fridapj "
                arg_str: "frida://list/remote/127.0.0.1:27042/"
                comment: "List processes on a remote frida-server"
      - name: fridaa
        cname: cmd_fridaa
        summary: "List applications on a device"
        description: >
          Enumerates the applications known to a Frida device and emits a
          structured JSON reply. With no argument it lists the local device, or
          pass a frida:// URI to select a USB or remote device. Application
          listing is most useful for Android and iOS targets reached over USB.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: uri
            type: RZ_CMD_ARG_TYPE_STRING
            optional: true
        details:
          - name: "Examples"
            entries:
              - text: "fridaaj"
                comment: "List local applications as JSON, returns a frida_unavailable error if built without frida-core"
              - text: "fridaaj "
                arg_str: "frida://apps/usb/device-1/"
                comment: "List applications on a USB device by id"
      - name: fridao
        cname: cmd_fridao
        summary: "Open a Frida session"
        description: >
          Opens a session for a frida:// URI on a local, USB, or remote device:
          attach to a pid or process name, spawn a target suspended, or launch
          and resume it. Stores the live session and emits a structured JSON
          reply.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: uri
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridaoj "
                arg_str: "frida://attach/local//1234"
                comment: "Attach to local PID 1234"
              - text: "fridaoj "
                arg_str: "frida://attach/usb//com.example.app"
                comment: "Attach by process name on the single USB device"
              - text: "fridaoj "
                arg_str: "frida://spawn/usb//com.example.app"
                comment: "Spawn an Android package suspended over USB, resume with fridarj"
              - text: "fridaoj "
                arg_str: "frida://launch/local///bin/ls"
                comment: "Launch /bin/ls and resume it immediately"
              - text: "fridaoj "
                arg_str: "frida://attach/remote/127.0.0.1:27042/1234"
                comment: "Attach to PID 1234 over a remote frida-server"
      - name: fridar
        cname: cmd_fridar
        summary: "Resume the open Frida session"
        description: >
          Resumes a target that was spawned suspended by the open command. Emits
          a structured JSON reply.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridac
        cname: cmd_fridac
        summary: "Close the open Frida session"
        description: >
          Detaches the open session and forgets it. A target that was spawned
          but never resumed is killed. An attached or launched target keeps
          running. Emits a structured JSON reply.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridae
        cname: cmd_fridae
        summary: "Evaluate JavaScript in the target process"
        description: >
          Loads the rz-frida agent into the open session on first use, then
          evaluates a JavaScript expression inside the target process and
          returns its value and type. Quote the expression when it contains
          spaces, or use fridal for a script that lives in a file.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: source
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridaej "
                arg_str: "Process.arch"
                comment: "Read the target architecture from the agent"
              - text: "fridaej "
                arg_str: "\"1 + 1\""
                comment: "Evaluate an expression, quote it when it has spaces"
      - name: fridal
        cname: cmd_fridal
        summary: "Load and evaluate a JavaScript file in the target process"
        description: >
          Reads a JavaScript file from disk and evaluates it inside the target
          process through the rz-frida agent. Useful for instrumentation
          scripts that are too large to pass on the command line.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: file
            type: RZ_CMD_ARG_TYPE_FILE
        details:
          - name: "Examples"
            entries:
              - text: "fridalj "
                arg_str: "hook.js"
                comment: "Evaluate hook.js inside the target process"
      - name: fridai
        cname: cmd_fridai
        summary: "Ping the agent in the target process"
        description: >
          Loads the rz-frida agent into the open session on first use and pings
          it, returning the agent version and the target platform, architecture,
          and pointer size. A quick way to check the host-agent message channel
          is alive.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridam
        cname: cmd_fridam
        summary: "Read buffered agent messages"
        description: >
          Drains the asynchronous output captured from the injected agent:
          console logs, uncaught script errors, and unsolicited send()
          notifications with any binary data. Returns them as a JSON array and
          clears the buffer.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridax
        cname: cmd_fridax
        summary: "Read target memory"
        description: >
          Reads a block of memory from the target process through the rz-frida
          agent and returns the bytes as a hex string. Loads the agent into the
          open session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: address
            type: RZ_CMD_ARG_TYPE_NUM
          - name: size
            type: RZ_CMD_ARG_TYPE_NUM
        details:
          - name: "Examples"
            entries:
              - text: "fridaxj "
                arg_str: "0x1000 64"
                comment: "Read 64 bytes at 0x1000 from the target process"
      - name: fridaw
        cname: cmd_fridaw
        summary: "Write target memory"
        description: >
          Writes a hex byte string into the target process memory through the
          rz-frida agent and returns the number of bytes written. Loads the
          agent into the open session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: address
            type: RZ_CMD_ARG_TYPE_NUM
          - name: bytes
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridawj "
                arg_str: "0x1000 deadbeef"
                comment: "Write the bytes 'de ad be ef' at 0x1000 in the target"
      - name: fridaR
        cname: cmd_fridaR
        summary: "List target memory ranges"
        description: >
          Lists the memory ranges of the target process through the rz-frida
          agent, each with its base, size, protection, and backing file when
          mapped. The agent caches the list and re-enumerates it after code runs
          in the target, pass any argument to force a fresh enumeration. Loads
          the agent into the open session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: refresh
            type: RZ_CMD_ARG_TYPE_STRING
            optional: true
        details:
          - name: "Examples"
            entries:
              - text: "fridaRj"
                comment: "List the cached target memory ranges"
              - text: "fridaRj "
                arg_str: "refresh"
                comment: "Re-enumerate the ranges instead of using the cache"
      - name: fridat
        cname: cmd_fridat
        summary: "List target threads"
        description: >
          Lists the threads of the target process through the rz-frida agent,
          each with its id and state. Loads the agent into the open session on
          first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
      - name: fridaM
        cname: cmd_fridaM
        summary: "List target modules"
        description: >
          Lists the modules loaded in the target process through the rz-frida
          agent, each with its name, base, size, and path. The agent caches the
          list and re-enumerates it after code runs in the target, pass any
          argument to force a fresh enumeration. Loads the agent into the open
          session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: refresh
            type: RZ_CMD_ARG_TYPE_STRING
            optional: true
        details:
          - name: "Examples"
            entries:
              - text: "fridaMj"
                comment: "List the cached target modules"
              - text: "fridaMj "
                arg_str: "refresh"
                comment: "Re-enumerate the modules instead of using the cache"
      - name: fridaE
        cname: cmd_fridaE
        summary: "List target module exports"
        description: >
          Lists the exports of a module loaded in the target process through the
          rz-frida agent, each with its type, name, and address. Loads the agent
          into the open session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: module
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridaEj "
                arg_str: "libc.so"
                comment: "List the exports of libc.so in the target"
      - name: fridaI
        cname: cmd_fridaI
        summary: "List target module imports"
        description: >
          Lists the imports of a module loaded in the target process through the
          rz-frida agent, each with its type, name, source module, and address.
          Loads the agent into the open session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: module
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridaIj "
                arg_str: "libc.so"
                comment: "List the imports of libc.so in the target"
      - name: fridaS
        cname: cmd_fridaS
        summary: "List target module symbols"
        description: >
          Lists the symbols of a module loaded in the target process through the
          rz-frida agent, each with its name, address, and type. The list is
          empty for a module that carries no symbol table. Loads the agent into
          the open session on first use.
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: module
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridaSj "
                arg_str: "libc.so"
                comment: "List the symbols of libc.so in the target"
