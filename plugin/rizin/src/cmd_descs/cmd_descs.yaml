---
name: root
commands:
  - name: frida
    cname: cmd_frida
    summary: "Interact with Frida targets"
    description: "Commands for the rz-frida integration covering plugin and session status, frida:// URI validation, and Frida device and process enumeration."
    details:
      - name: "Session status"
        entries:
          - text: "fridas"
            comment: "Print plugin/session status in plain text"
          - text: "fridasj"
            comment: "Print plugin/session status as JSON"
      - name: "URI grammar"
        entries:
          - text: "fridau "
            arg_str: "frida://attach/local//1234"
            comment: "Validate URI for attaching to local PID 1234"
          - text: "fridau "
            arg_str: "frida://spawn/usb/device-1/com.example.app"
            comment: "Validate URI for spawning an Android package over USB"
          - text: "fridau "
            arg_str: "frida://attach/remote/127.0.0.1:27042/4321"
            comment: "Validate URI for attaching to PID 4321 over remote frida-server"
          - text: "fridauj "
            arg_str: "frida://launch/local///bin/ls"
            comment: "Validate launch URI for /bin/ls and emit JSON"
      - name: "Device enumeration"
        entries:
          - text: "fridadj"
            comment: "Enumerate connected Frida devices as JSON"
      - name: "Process listing"
        entries:
          - text: "fridapj"
            comment: "Enumerate local processes as JSON"
      - name: "Session control"
        entries:
          - text: "fridaoj "
            arg_str: "frida://spawn/local///bin/ls"
            comment: "Spawn /bin/ls suspended and open a session"
          - text: "fridarj"
            comment: "Resume the spawned target"
    subcommands:
      - name: fridas
        cname: cmd_fridas
        summary: "Print Frida session status"
        description: "Reports whether a session is active and prints the current session state (new, resolved, connecting, attached, detaching, closed, or error)."
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_STANDARD
          - RZ_OUTPUT_MODE_JSON
        args: []
        details:
          - name: "Examples"
            entries:
              - text: "fridas"
                comment: "active and state lines in plain text"
              - text: "fridasj"
                comment: "Same data wrapped in the rz-frida JSON envelope"
      - name: fridau
        cname: cmd_fridau
        summary: "Validate a frida:// URI"
        description: "Parses and validates a frida:// URI without contacting any Frida device. Useful for verifying URI syntax in scripts or CI before attempting to attach."
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_STANDARD
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: uri
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "URI grammar"
            entries:
              - text: "frida://"
                arg_str: "<action>/<transport>/<device>/<target>"
                comment: "Full grammar for the frida:// URI"
              - text: "action   "
                arg_str: "= list | apps | attach | spawn | launch"
                comment: "Operation requested for the session"
              - text: "transport"
                arg_str: "= local | usb | remote"
                comment: "Transport used to reach the Frida target"
              - text: "device   "
                arg_str: "= empty | device-id | host:port"
                comment: "Empty for local, id for USB, host:port for remote"
              - text: "target   "
                arg_str: "= pid | process-name | package-name | executable-path"
                comment: "Target selector required by attach/spawn/launch"
          - name: "Examples"
            entries:
              - text: "fridau "
                arg_str: "frida://attach/local//1234"
                comment: "Attach to local PID 1234"
              - text: "fridau "
                arg_str: "frida://spawn/usb/device-1/com.example.app"
                comment: "Spawn an Android package on a USB device"
              - text: "fridau "
                arg_str: "frida://launch/local///bin/ls"
                comment: "Launch /bin/ls locally (note the leading slash in the path)"
              - text: "fridauj "
                arg_str: "frida://attach/remote/127.0.0.1:27042/4321"
                comment: "Validate remote-attach URI and emit JSON"
      - name: fridad
        cname: cmd_fridad
        summary: "List Frida devices"
        description: "Enumerates devices known to the Frida device manager (local, USB, and remote) and emits a structured JSON reply."
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
        details:
          - name: "Examples"
            entries:
              - text: "fridadj"
                comment: "List devices as JSON; returns a frida_unavailable error if built without frida-core"
      - name: fridap
        cname: cmd_fridap
        summary: "List processes on the local device"
        description: "Enumerates the processes visible to the local Frida device and emits a structured JSON reply."
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
        details:
          - name: "Examples"
            entries:
              - text: "fridapj"
                comment: "List local processes as JSON; returns a frida_unavailable error if built without frida-core"
      - name: fridao
        cname: cmd_fridao
        summary: "Open a Frida session"
        description: "Opens a session for a frida:// URI on the local device: attach to a pid, spawn a target suspended, or launch and resume it. Stores the live session and emits a structured JSON reply."
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args:
          - name: uri
            type: RZ_CMD_ARG_TYPE_STRING
        details:
          - name: "Examples"
            entries:
              - text: "fridaoj "
                arg_str: "frida://attach/local//1234"
                comment: "Attach to local PID 1234"
              - text: "fridaoj "
                arg_str: "frida://spawn/local///bin/ls"
                comment: "Spawn /bin/ls suspended and attach; resume later with fridarj"
              - text: "fridaoj "
                arg_str: "frida://launch/local///bin/ls"
                comment: "Launch /bin/ls and resume it immediately"
      - name: fridar
        cname: cmd_fridar
        summary: "Resume the open Frida session"
        description: "Resumes a target that was spawned suspended by the open command. Emits a structured JSON reply."
        type: RZ_CMD_DESC_TYPE_ARGV_STATE
        modes:
          - RZ_OUTPUT_MODE_JSON
        args: []
        details:
          - name: "Examples"
            entries:
              - text: "fridarj"
                comment: "Resume the spawned target, and returns an error if no session is open"
